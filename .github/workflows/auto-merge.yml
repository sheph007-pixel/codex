name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main with PAT
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT }}
          persist-credentials: true
      - name: Verify PAT and save diagnostics
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "PAT_STATUS=EMPTY" > /tmp/pat-diag.txt
            echo "::error::PAT secret is empty!"
            exit 1
          fi
          echo "PAT_STATUS=SET" > /tmp/pat-diag.txt
          echo "PAT_PREFIX=$(echo "$PAT" | head -c 10)..." >> /tmp/pat-diag.txt
          # Check if classic (ghp_) or fine-grained (github_pat_)
          if echo "$PAT" | grep -q "^ghp_"; then
            echo "PAT_TYPE=classic" >> /tmp/pat-diag.txt
          elif echo "$PAT" | grep -q "^github_pat_"; then
            echo "PAT_TYPE=fine-grained" >> /tmp/pat-diag.txt
          else
            echo "PAT_TYPE=unknown" >> /tmp/pat-diag.txt
          fi
          # Test API access
          HEADERS=$(curl -s -I -H "Authorization: token $PAT" \
            "https://api.github.com/repos/${{ github.repository }}" 2>&1)
          HTTP=$(echo "$HEADERS" | head -1)
          SCOPES=$(echo "$HEADERS" | grep -i "x-oauth-scopes" || echo "none (fine-grained token)")
          echo "HTTP_RESPONSE=$HTTP" >> /tmp/pat-diag.txt
          echo "SCOPES=$SCOPES" >> /tmp/pat-diag.txt
          cat /tmp/pat-diag.txt
      - name: Commit PAT diagnostics
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp /tmp/pat-diag.txt ./pat-diag.txt 2>/dev/null || echo "no diagnostics" > ./pat-diag.txt
          git add pat-diag.txt
          git commit -m "debug: PAT diagnostics [auto]" || true
          git push origin main || true
      - name: Merge branch and push to main
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge $BRANCH into main"
          echo "Pushing to main (using PAT from checkout)..."
          git push origin main
      - name: Re-checkout main after merge
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
