name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Merge branch to main via GitHub API
        if: github.event_name == 'push'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main via API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/merges" \
            -d "{\"base\":\"main\",\"head\":\"$BRANCH\",\"commit_message\":\"Auto-merge $BRANCH into main\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Merge API: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Merge failed"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Push main to trigger Vercel deploy
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Empty commit to trigger Vercel's Git webhook
          git commit --allow-empty -m "deploy: trigger Vercel production [auto]"
          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git HEAD:main
          echo "Pushed empty commit to main — Vercel should deploy"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
