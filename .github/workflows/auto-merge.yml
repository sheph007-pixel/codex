name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
      - name: Merge branch and push to main
        if: github.event_name == 'push'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge $BRANCH into main"
          if [ -n "$PAT" ]; then
            echo "Pushing with PAT (will trigger Vercel integration)..."
            git remote set-url origin "https://x-access-token:${PAT}@github.com/${{ github.repository }}.git"
          else
            echo "::warning::PAT secret not set. Using GITHUB_TOKEN (won't trigger Vercel)."
            echo "To fix: add a PAT secret at Settings > Secrets > Actions"
          fi
          git push origin main
      - name: Re-checkout main after merge
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
