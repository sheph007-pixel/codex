name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Merge branch to main via GitHub API
        if: github.event_name == 'push'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main via API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/merges" \
            -d "{\"base\":\"main\",\"head\":\"$BRANCH\",\"commit_message\":\"Auto-merge $BRANCH into main\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Merge API: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Merge failed"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT }}
      - name: Deploy to Vercel Production
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel API deploy (relying on Git integration)"
            exit 0
          fi
          echo "Triggering Vercel production deployment via API..."
          DEPLOY_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d "{
              \"name\": \"crm\",
              \"project\": \"prj_InuvqogNr3rzD54Ap6HEe5nX2RdW\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": 1165902589,
                \"ref\": \"main\"
              }
            }")
          echo "$DEPLOY_RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'error' in d:
              print(f'WARNING: {d[\"error\"].get(\"message\", d[\"error\"])}')
              sys.exit(0)
          print(f'Deployment ID: {d.get(\"id\", \"?\")}')
          print(f'URL: https://{d.get(\"url\", \"?\")}')
          print(f'State: {d.get(\"readyState\", d.get(\"status\", \"?\"))}')
          print('Vercel production deploy triggered successfully!')
          "
      - name: Wait for Vercel build and verify live site
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          echo "Waiting 90 seconds for Vercel to build and deploy..."
          sleep 90
          echo "Checking live site..."
          SITE_CONTENT=$(curl -sL --max-time 30 "https://crm-one-sand-78.vercel.app/" || echo "FETCH_FAILED")
          TITLE=$(echo "$SITE_CONTENT" | grep -oP '<title>\K[^<]+' || echo "NO_TITLE_FOUND")
          HEADER=$(echo "$SITE_CONTENT" | grep -oP 'class="logo"[^>]*>.*?</div>' | head -1 || echo "NO_HEADER_FOUND")
          echo "===== LIVE SITE VERIFICATION ====="
          echo "Title: $TITLE"
          echo "Header snippet: $HEADER"
          echo "Content length: $(echo "$SITE_CONTENT" | wc -c) bytes"
          echo "=================================="
          # Report result as commit status
          MAIN_SHA=$(git rev-parse HEAD)
          curl -s -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/statuses/$MAIN_SHA" \
            -d "{\"state\":\"success\",\"description\":\"Live title: $TITLE\",\"context\":\"vercel-live-check\"}"
          echo "Reported live check to commit status"
      - name: Push empty commit as backup trigger
        continue-on-error: true
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "deploy: trigger Vercel production [auto]"
          git push https://x-access-token:${PAT}@github.com/${{ github.repository }}.git HEAD:main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
