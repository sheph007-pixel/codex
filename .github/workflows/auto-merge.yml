name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Merge branch to main via GitHub API
        if: github.event_name == 'push'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main via API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/merges" \
            -d "{\"base\":\"main\",\"head\":\"$BRANCH\",\"commit_message\":\"Auto-merge $BRANCH into main\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Merge API: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Merge failed"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Vercel Production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set, skipping Vercel deploy"
            exit 0
          fi
          # Find the Vercel project linked to this repo
          PROJECT_INFO=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects")
          # Find project linked to this GitHub repo
          PROJECT_ID=$(echo "$PROJECT_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for p in data.get('projects', []):
              link = p.get('link', {})
              if link.get('type') == 'github' and link.get('repo') == 'sheph007-pixel/codex':
                  print(p['id'])
                  sys.exit(0)
          # Fallback: try project named 'crm'
          for p in data.get('projects', []):
              if p.get('name') == 'crm':
                  print(p['id'])
                  sys.exit(0)
          print('NOT_FOUND')
          " 2>/dev/null)
          if [ "$PROJECT_ID" = "NOT_FOUND" ] || [ -z "$PROJECT_ID" ]; then
            echo "::error::No Vercel project found for this repo"
            # Save project list for debugging
            echo "$PROJECT_INFO" | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for p in data.get('projects', []):
                link = p.get('link', {})
                print(f'  Project: {p[\"name\"]} - repo: {link.get(\"repo\", \"none\")} - type: {link.get(\"type\", \"none\")}')
            " 2>/dev/null
            exit 1
          fi
          echo "Found project ID: $PROJECT_ID"
          # Create deployment via API
          DEPLOY_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d "{
              \"name\": \"crm\",
              \"project\": \"$PROJECT_ID\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repo\": \"sheph007-pixel/codex\",
                \"ref\": \"main\"
              }
            }")
          echo "$DEPLOY_RESPONSE" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          if 'error' in d:
              print(f'Error: {d[\"error\"].get(\"message\", d[\"error\"])}')
              sys.exit(1)
          print(f'Deployment: {d.get(\"id\", \"unknown\")}')
          print(f'URL: {d.get(\"url\", \"unknown\")}')
          print(f'Status: {d.get(\"readyState\", d.get(\"status\", \"unknown\"))}')
          " 2>/dev/null
          echo "Vercel production deploy triggered!"
      - name: Save deploy debug
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Deploy step failed - saving last output" > deploy-log.txt
          # Re-run the API calls with output saved
          PROJECT_INFO=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects" 2>&1)
          echo "=== Projects ===" >> deploy-log.txt
          echo "$PROJECT_INFO" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for p in data.get('projects', []):
              link = p.get('link', {})
              print(f'Project: {p[\"name\"]} id:{p[\"id\"]} repo:{link.get(\"repo\",\"none\")} type:{link.get(\"type\",\"none\")}')
          " >> deploy-log.txt 2>&1
          git add deploy-log.txt
          git commit -m "debug: deploy error log [auto]" || true
          git push origin main || true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
