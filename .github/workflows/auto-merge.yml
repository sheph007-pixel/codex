name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Merge branch to main via GitHub API
        if: github.event_name == 'push'
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main via API..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/merges" \
            -d "{\"base\":\"main\",\"head\":\"$BRANCH\",\"commit_message\":\"Auto-merge $BRANCH into main\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          echo "Merge API: HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Merge failed"
            echo "$RESPONSE" | head -n -1
            exit 1
          fi
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Vercel Production
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN not set, skipping"
            exit 0
          fi
          echo "Getting latest main SHA..."
          MAIN_SHA=$(git rev-parse HEAD)
          echo "Main SHA: $MAIN_SHA"
          echo "Creating Vercel deployment for crm project..."
          DEPLOY_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.vercel.com/v13/deployments" \
            -d "{
              \"name\": \"crm\",
              \"project\": \"prj_InuvqogNr3rzD54Ap6HEe5nX2RdW\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": 1165902589,
                \"ref\": \"main\",
                \"sha\": \"$MAIN_SHA\"
              }
            }")
          HTTP_CODE=$(echo "$DEPLOY_RESPONSE" | tail -1)
          BODY=$(echo "$DEPLOY_RESPONSE" | head -n -1)
          echo "Vercel API HTTP: $HTTP_CODE"
          echo "$BODY" | python3 -c "
          import json, sys
          try:
              d = json.load(sys.stdin)
              if 'error' in d:
                  print(f'ERROR: {d[\"error\"].get(\"message\", d[\"error\"])}')
                  sys.exit(1)
              print(f'Deployment ID: {d.get(\"id\", \"?\")}')
              print(f'URL: https://{d.get(\"url\", \"?\")}')
              print(f'State: {d.get(\"readyState\", d.get(\"status\", \"?\"))}')
          except:
              print(f'Raw response: {sys.stdin.read()[:500]}')
              sys.exit(1)
          "
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Vercel deployment failed with HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi
      - name: Clean debug files
        run: |
          rm -f vercel-debug.txt deploy-log.txt pat-diag.txt deploy-debug.txt
          if git diff --name-only | grep -q "debug\|log\|diag"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "clean: remove debug files [auto]" || true
            git push origin main || true
          fi
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
