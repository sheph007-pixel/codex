name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main with PAT
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT }}
          persist-credentials: true
      - name: Verify PAT works
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::PAT secret is empty or not set!"
            exit 1
          fi
          # Test PAT against GitHub API
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $PAT" \
            "https://api.github.com/repos/${{ github.repository }}")
          echo "PAT API test: HTTP $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "::error::PAT is invalid or doesn't have repo access (HTTP $RESPONSE)"
            exit 1
          fi
          # Check scopes
          SCOPES=$(curl -s -I -H "Authorization: token $PAT" \
            "https://api.github.com/repos/${{ github.repository }}" | grep -i "x-oauth-scopes" || echo "no scopes header")
          echo "PAT scopes: $SCOPES"
      - name: Merge branch and push to main
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge $BRANCH into main"
          echo "Pushing to main (using PAT from checkout)..."
          git push origin main
      - name: Re-checkout main after merge
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
