name: Auto-merge to main
on:
  push:
    branches: ["claude/*"]
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: "auto-merge"
  cancel-in-progress: true
jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Merge branch and push to main
        if: github.event_name == 'push'
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH"
          git merge "origin/$BRANCH" --no-edit -m "Auto-merge $BRANCH into main"
          git push origin main
      - name: Re-checkout main after merge
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Trigger Vercel deploy via deploy hook
        env:
          DEPLOY_HOOK: ${{ secrets.AUTODEPLOY }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "::error::AUTODEPLOY secret is NOT set. Go to repo Settings > Secrets and add it."
            echo "The value should be your Vercel Deploy Hook URL from:"
            echo "  Vercel > Project Settings > Git > Deploy Hooks"
            echo "It looks like: https://api.vercel.com/v1/integrations/deploy/prj_XXXX/YYYY"
            exit 1
          fi
          # Validate URL format (without revealing the actual URL)
          if echo "$DEPLOY_HOOK" | grep -qE '^https://api\.vercel\.com/v1/integrations/deploy/'; then
            echo "✓ Deploy hook URL format looks correct (Vercel deploy hook)"
          else
            echo "::warning::Deploy hook URL does NOT look like a Vercel deploy hook."
            echo "Expected format: https://api.vercel.com/v1/integrations/deploy/prj_XXXX/YYYY"
            echo "Actual URL starts with: $(echo "$DEPLOY_HOOK" | head -c 30)..."
          fi
          echo "Triggering Vercel deploy hook..."
          HTTP_CODE=$(curl -v -o /tmp/deploy-response.txt -w "%{http_code}" -X POST "$DEPLOY_HOOK" 2>/tmp/deploy-headers.txt)
          echo "=== Response Body ==="
          cat /tmp/deploy-response.txt
          echo ""
          echo "=== HTTP Status: $HTTP_CODE ==="
          echo "=== Response Headers ==="
          grep -i "< " /tmp/deploy-headers.txt || true
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Deploy hook failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy hook triggered successfully with HTTP $HTTP_CODE"
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
